services:
  mongodb:
    image: mongo:7
    container_name: tourtravel-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./BE_TOURTRAVEL
    container_name: tourtravel-backend
    restart: unless-stopped
    env_file:
      - ./BE_TOURTRAVEL/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: tourtravel
      DEBUG: "true"
    depends_on:
      - mongodb
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./FE_TOURTRAVEL
    container_name: tourtravel-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo_data:
